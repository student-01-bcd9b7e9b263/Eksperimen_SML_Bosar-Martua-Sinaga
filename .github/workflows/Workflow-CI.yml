name: Build and Push Docker Image CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Debug struktur folder
      - name: Debug Folder Structure
        run: |
          echo "===== CURRENT DIRECTORY ====="
          pwd

          echo "===== ROOT ====="
          ls -la

          echo "===== WORKFLOW-CI ====="
          ls -la ./Workflow-CI

          echo "===== MLPROJECT ====="
          ls -la ./Workflow-CI/MLProject

      # Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build dan Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Workflow-CI/MLProject
          file: ./Workflow-CI/MLProject/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ispu-mlproject:latest
            ${{ secrets.DOCKER_USERNAME }}/ispu-mlproject:${{ github.sha }}
