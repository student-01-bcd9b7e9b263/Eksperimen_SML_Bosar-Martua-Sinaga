name: Build and Push Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Debug Folder Structure
        run: |
          echo "Daftar folder di root:"
          ls -la
          echo "========================"
          echo "Daftar isi Workflow-CI:"
          ls -la Workflow-CI/ || echo "Folder tidak ditemukan!"
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          # Rahasia (Secrets) ini harus Anda seting di pengaturan GitHub repo Anda!
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          # Folder tempat Dockerfile berada
          context: Workflow-CI
          push: true
          # Ganti USERNAME_DOCKERHUB_ANDA di bawah ini
          tags: bon12/ispu-mlproject:latest
