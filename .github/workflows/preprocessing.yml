name: Automated Data Preprocessing ISPU

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  preprocess_data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Automation Script
        run: python preprocessing/automate_Bosar-Martua-Sinaga.py

      - name: Commit and Push Processed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add preprocessing/ispu_dki1_preprocessing.csv
          

          git diff --quiet && git diff --staged --quiet || git commit -m "Automasi: Update dataset ISPU bersih"
          git push origin HEAD:main
